services:
  # 1. Main Express API Web Service
  - type: web
    name: devfeed-bot-api
    env: node
    plan: free # Can upgrade to standard if needed
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # User enters their MongoDB connection string in Render dashboard
      - key: REDIS_HOST
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: password
      - key: JWT_SECRET
        generateValue: true # Secure random string generated by Render
      - key: GEMINI_API_KEY
        sync: false # User enters their Gemini API Key in Render dashboard
      - key: DEVFEED_API_URL
        sync: false # User enters their DevFeed API URL in Render dashboard
      - key: DEVFEED_API_KEY
        sync: false
      - key: BOT_SYNC_INTERVAL
        value: "*/15 * * * *"

  # 2. BullMQ Background Worker Service
  - type: worker
    name: devfeed-bot-worker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: devfeed-cache-redis
          property: password
      - key: GEMINI_API_KEY
        sync: false
      - key: DEVFEED_API_URL
        sync: false
      - key: DEVFEED_API_KEY
        sync: false

# 3. Dedicated Managed Redis Database
redis:
  name: devfeed-cache-redis
  plan: free
  ipAllowList: [] # Allow only internal services to connect
